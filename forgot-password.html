<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | Ridhi Sidhi Security Services - Premium Protection</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body>
    
    <div class="preloader">
        <div class="loader">
            <div class="loader-line"></div>
            <div class="loader-line"></div>
            <div class="loader-line"></div>
        </div>
    </div>

    <div id="header"></div>

<div class="auth-page">
    <div class="auth-box">

        <!-- Heading -->
        <h2 id="forgotTitle">Forgot Password</h2>
        <p class="auth-subtitle" id="forgotSubtitle">
            Reset your account password
        </p>

        <!-- Forgot Password Form -->
        <form class="auth-form" id="forgotForm">

            <div class="form-group">
                <input type="email" id="email"
                       placeholder="Enter your registered email"
                       required>
            </div>

            <button type="submit" class="btn-gold full-btn">
                Send Reset Link
            </button>
        </form>

        <p class="auth-footer">
            Remember your password?
            <a href="login.html" class="gold">Back to Login</a>
        </p>

    </div>
</div>

<div id="footer"></div>
    
    <button class="back-to-top">
        <i class="fas fa-chevron-up"></i>
    </button>



    <script src="assets/js/app.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>

</body>
</html>
